  <line x1="16" y1="19.5" x2="16" y2="29" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="12.97" y1="14.25" x2="4.73" y2="9.5" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="19.03" y1="17.75" x2="27.27" y2="22.5" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="12.97" y1="17.75" x2="4.73" y2="22.5" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="19.03" y1="14.25" x2="27.27" y2="9.5" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <!-- spoke handles (knobs) -->
  <circle cx="16" cy="3" r="1.5" fill="#3b82f6"/>
